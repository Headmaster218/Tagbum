{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <div>
    <h1>打标签</h1>
    <p>逐张处理照片。默认显示未打标签的照片，点选标签库即可添加到当前照片。</p>
  </div>
  <div class="tag-progress">
    <span id="tagger-position">0</span> / {{ total_groups }}
  </div>
</section>

<section class="filters">
  <a class="filter-chip {% if active_status == 'untagged' %}active{% endif %}" href="/tag?status=untagged">未打标签 <span>{{ untagged_count }}</span></a>
  <a class="filter-chip {% if active_status == 'tagged' %}active{% endif %}" href="/tag?status=tagged">已打标签 <span>{{ tagged_count }}</span></a>
</section>

<section class="toolbar tagger-jumpbar">
  <form class="pager-jump" data-jump-combined-form>
    <label>第 N 张</label>
    <input type="number" name="index" min="1" max="{{ total_groups }}" value="1">
    <input type="hidden" name="jump_date" data-date-strip-value>
    <button type="submit">跳转</button>
    <div class="date-strip-shell">
      <div class="date-strip-info" data-date-strip-info>选择日期</div>
      <div class="date-strip" data-date-strip data-target="tagger" data-tag-status="{{ active_status }}" data-selected-date="{{ current_date }}"></div>
    </div>
  </form>
</section>

<section class="tagger" data-total-groups="{{ total_groups }}" data-tag-status="{{ active_status }}">
  <div class="tagger-stage">
    <button class="tagger-nav" type="button" data-tagger-prev aria-label="上一张">&lt;</button>
    <button class="tagger-photo" type="button" data-open-current>
      <img id="tagger-image" alt="">
      <video id="tagger-live" muted loop playsinline hidden></video>
      <span id="tagger-placeholder" class="placeholder">正在载入</span>
    </button>
    <button class="tagger-nav" type="button" data-tagger-next aria-label="下一张">&gt;</button>
  </div>

  <aside class="tagger-panel">
    <div>
      <h2 id="tagger-title">未选择照片</h2>
      <p id="tagger-date" class="muted-text"></p>
      <div id="tagger-kinds" class="chips"></div>
    </div>

    <section>
      <h3>当前标签</h3>
      <div id="current-tags" class="chips"></div>
    </section>

    <div class="tagger-actions">
      <button type="button" data-copy-prev-tags>复制上一张标签</button>
    </div>

    <form id="quick-tag-form" class="tag-form">
      <input name="name" placeholder="新标签" autocomplete="off">
      <button type="submit">添加</button>
    </form>

    <section>
      <h3>标签库</h3>
      <div id="tag-library" class="chips tag-library">
        {% for name, count in tags %}
          <button class="chip tag-option" type="button" data-tag-name="{{ name }}">{{ name }} <span>{{ count }}</span></button>
        {% endfor %}
      </div>
      <p class="empty" id="tag-library-empty" {% if tags %}hidden{% endif %}>还没有标签。先给当前照片添加一个新标签。</p>
    </section>
  </aside>
</section>
{% endblock %}
