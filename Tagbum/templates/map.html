{% extends "base.html" %}
{% block content %}
<section class="page-head">
  <div>
    <h1>地图</h1>
    <p>滚轮缩放，左键拖拽。当前视野会按可调密度的网格聚合，每格显示一张代表图和对应照片数量。</p>
  </div>
  <div class="page-count">
    {{ located_count }} 组照片带有位置
  </div>
</section>

<section class="map-toolbar">
  <label>
    图片密度
    <input type="range" min="0" max="5" step="1" value="3" data-map-density>
  </label>
  <span data-map-density-label>84 格</span>
</section>

<section class="map-workspace">
  <div class="map-canvas" data-map data-center-lat="{{ center_lat }}" data-center-lon="{{ center_lon }}" data-zoom="10" data-density="3" data-tile-provider="{{ map_tile_provider }}">
    <div class="map-tiles" data-map-tiles></div>
    <div class="map-markers" data-map-markers></div>
    <div class="map-controls">
      <button type="button" data-map-zoom-in aria-label="放大">+</button>
      <button type="button" data-map-zoom-out aria-label="缩小">-</button>
      <button type="button" data-map-locate aria-label="定位当前设备">定位</button>
    </div>
    <div class="map-status" data-map-count>0</div>
    <div class="map-scale">
      <span class="map-scale-bar" data-map-scale></span>
      <span class="map-scale-label" data-map-scale-label>--</span>
    </div>
    <div class="map-attribution">© OpenStreetMap contributors</div>
  </div>
</section>
{% endblock %}
