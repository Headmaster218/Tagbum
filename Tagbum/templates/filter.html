{% extends "base.html" %}
{% block content %}
<section class="page-head home-head">
  <div>
    <h1>标签筛选</h1>
    <p>标签、Live、Image、Video、Edited、HDR 都作为同级条件。规则组支持与、或、非，自由组合后再无限滚动浏览。</p>
  </div>
  <div class="page-count" data-filter-count>
    0 / {{ total_groups }}
  </div>
</section>

<section
  class="filter-builder-panel"
  data-filter-builder-root
  data-total-groups="{{ total_groups }}"
  data-page-size="{{ page_size }}"
  data-current-date="{{ current_date }}"
>
  <script type="application/json" data-filter-tags>{{ tags|tojson }}</script>
  <script type="application/json" data-filter-resource-options>{{ resource_options|tojson }}</script>
  <script type="application/json" data-filter-initial-expr>{{ initial_filter_expr|tojson }}</script>

  <div class="filter-builder-head">
    <div>
      <h2>筛选规则</h2>
      <p class="muted-text">规则组可继续嵌套。条件支持单条取反，分组也支持整体取反。</p>
    </div>
    <div class="filter-builder-actions">
      <button type="button" data-filter-apply>应用筛选</button>
      <button type="button" data-filter-reset class="secondary-button">清空</button>
    </div>
  </div>

  <div class="filter-builder-tree" data-filter-builder-tree></div>
</section>

<section
  class="home-layout"
  data-filter-gallery-root
  data-total-groups="{{ total_groups }}"
  data-page-size="{{ page_size }}"
  data-current-date="{{ current_date }}"
>
  <div class="home-stream-column">
    <section class="home-gallery" data-filter-gallery></section>
    <div class="home-gallery-status" data-filter-gallery-status>准备加载</div>
    <div class="home-gallery-sentinel" data-filter-gallery-sentinel aria-hidden="true"></div>
  </div>

  <aside class="home-timeline-rail">
    <div class="home-timeline-panel">
      <div class="home-timeline-head">
        <strong data-filter-timeline-label>选择日期</strong>
        <button type="button" data-filter-timeline-jump>跳转</button>
      </div>
      <div class="home-timeline-shell">
        <div class="home-timeline-ruler">
          <span data-filter-timeline-current>--</span>
        </div>
        <div class="home-timeline" data-filter-timeline></div>
      </div>
    </div>
  </aside>
</section>
{% endblock %}
