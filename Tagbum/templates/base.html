<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tagbum</title>
    <script>
      (() => {
        const stored = localStorage.getItem("tagbum.theme");
        const theme = stored === "dark" || stored === "light"
          ? stored
          : (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body data-map-tile-provider="{{ map_tile_provider|default('osm') }}" data-ui-language="{{ ui_language|default('zh-CN') }}">
    <header class="topbar">
      <a class="brand" href="/">Tagbum</a>
      <div class="topbar-actions">
        <nav>
          <a href="/">主界面</a>
          <a href="/tag">打标签</a>
          <a href="/filter">标签筛选</a>
          <a href="/map">地图</a>
          <a href="/tools">工具</a>
          <a href="/settings">设置</a>
        </nav>
        <button type="button" data-open-tag-graph>标签关系</button>
        <button type="button" class="theme-toggle" data-theme-toggle aria-label="切换主题">深色</button>
      </div>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
